name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore GameBugTracker/GameBugTracker.csproj

      - name: Build
        run: dotnet build GameBugTracker/GameBugTracker.csproj --configuration Release --no-restore
